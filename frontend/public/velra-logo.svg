<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient (Subtle Rose Glassmorphism matching bg-primary/10) -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff1f2" /> <!-- rose-50 -->
      <stop offset="100%" stop-color="#ffe4e6" /> <!-- rose-100 -->
    </linearGradient>

    <!-- Logo Glow / Shadow -->
    <filter id="glowShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#f43f5e" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- The Rounded App Icon Background -->
  <rect width="400" height="400" x="56" y="56" rx="96" fill="url(#bgGradient)" stroke="#fecdd3" stroke-width="4" filter="url(#glowShadow)"/>

  <!-- The Heart Pulse Icon (Lucide React direct paths) -->
  <g transform="translate(128, 128) scale(10.6)" fill="none" stroke="#f43f5e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
    <path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/>
  </g>
</svg>
